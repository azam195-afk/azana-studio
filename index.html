<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZANA SMART ENHANCER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0b10; color: white; font-family: sans-serif; }
        .azana-card { background-color: #14151a; border: 1px solid #222; border-radius: 2rem; }
        .dashed-border { border: 2px dashed #444; border-radius: 24px; cursor: pointer; transition: 0.3s; }
        .dashed-border:hover { border-color: #2dd4bf; background: #1a1b23; }
        .loader { border: 4px solid #1a1b23; border-top: 4px solid #2dd4bf; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center shadow-lg">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-widest uppercase">Azana <span class="text-teal-400">Smart</span></h1>
        </div>

        <div class="azana-card p-6 shadow-2xl">
            <div id="dropArea" class="dashed-border p-10 flex flex-col items-center text-center">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="previewContainer" class="hidden w-full mb-4">
                    <img id="imgPreview" class="w-full rounded-xl border border-teal-500/50 shadow-lg">
                </div>

                <div id="uploadUI">
                    <div class="w-16 h-16 bg-purple-900/20 rounded-full flex items-center justify-center mb-4 mx-auto text-purple-400">
                        <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    </div>
                    <p class="text-lg font-bold">Pilih Foto</p>
                    <p class="text-xs text-gray-500 mt-1">Tap di sini untuk upload</p>
                </div>
            </div>

            <button id="btnAction" class="w-full mt-6 py-4 bg-purple-600 hover:bg-purple-500 rounded-2xl font-bold hidden uppercase tracking-widest transition-all">
                Jernihkan Sekarang
            </button>
            
            <div id="loadingUI" class="hidden mt-6 text-center">
                <div class="loader mx-auto mb-2"></div>
                <p class="text-xs text-teal-400">Meminta bantuan Gemini...</p>
            </div>
        </div>

        <div id="resultBox" class="mt-6 p-5 azana-card hidden border-teal-900">
            <h3 class="text-teal-400 text-xs font-bold uppercase mb-3">Hasil Analisis / Instruksi:</h3>
            <div id="outputText" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap"></div>
            <button onclick="location.reload()" class="mt-4 text-xs text-gray-500 hover:text-white underline text-center w-full">Ganti Foto</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAHqzT20UpRRXY6gnCXASVAwG9R1ZHVUyw";
        // GANTI PROMPT DI BAWAH INI DENGAN PROMPT ANDALAN KAMU
        const PROMPT_SAKTI = "Tolong analisis foto ini dan berikan instruksi perbaikan pixel serta jernihkan secara visual. Jika kamu punya kemampuan untuk mengubah kualitasnya menjadi HD, lakukanlah.";

        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const btnAction = document.getElementById('btnAction');
        const loadingUI = document.getElementById('loadingUI');
        const resultBox = document.getElementById('resultBox');
        const outputText = document.getElementById('outputText');
        const uploadUI = document.getElementById('uploadUI');
        const previewContainer = document.getElementById('previewContainer');
        const imgPreview = document.getElementById('imgPreview');

        let base64Data = "";

        // Trigger buka file
        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    base64Data = reader.result.split(',')[1];
                    imgPreview.src = reader.result;
                    
                    // Tampilkan Preview
                    uploadUI.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                    btnAction.classList.remove('hidden');
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        btnAction.onclick = async (e) => {
            e.stopPropagation(); // Mencegah klik ke area drop
            
            btnAction.classList.add('hidden');
            loadingUI.classList.remove('hidden');

            const payload = {
                contents: [{
                    parts: [
                        { text: PROMPT_SAKTI },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const hasil = data.candidates[0].content.parts[0].text;
                    resultBox.classList.remove('hidden');
                    outputText.innerText = hasil;
                } else {
                    throw new Error("Respon kosong");
                }

            } catch (err) {
                console.error(err);
                alert("Error: Gagal memproses gambar. Cek koneksi atau API Key.");
            } finally {
                loadingUI.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
