<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZANA SMART ENHANCER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0b10; color: white; font-family: 'Inter', sans-serif; }
        .azana-card { background-color: #14151a; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dashed-border { border: 2px dashed #333; border-radius: 24px; transition: all 0.3s; }
        .dashed-border:hover { border-color: #2dd4bf; background: #1a1b23; }
        .loader { border-top-color: #2dd4bf; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="flex items-center justify-center gap-3 mb-6">
            <div class="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(45,212,191,0.4)]">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-widest">AZANA <span class="text-teal-400 text-sm block font-normal -mt-1">SMART ENHANCER</span></h1>
        </div>

        <div class="azana-card p-5 rounded-[2rem]">
            <div id="dropArea" class="dashed-border p-8 flex flex-col items-center text-center cursor-pointer">
                <div id="previewWrap" class="hidden w-full mb-4">
                    <img id="imgPreview" class="w-full rounded-xl border border-teal-500/30">
                </div>

                <div id="initialUI">
                    <div class="w-16 h-16 bg-purple-900/20 rounded-full flex items-center justify-center mb-4 mx-auto text-purple-400">
                        <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    </div>
                    <p class="text-lg font-bold">Drag & Drop Foto</p>
                    <p class="text-xs text-gray-500 mt-1">File akan dioptimasi otomatis oleh AI</p>
                </div>
                
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </div>

            <button id="btnAction" class="w-full mt-5 py-4 bg-purple-600 hover:bg-purple-500 rounded-2xl font-bold text-sm tracking-widest transition-all hidden uppercase">
                Jernihkan Sekarang
            </button>
            
            <div id="loadingUI" class="hidden flex-col items-center mt-5">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-800 h-10 w-10 mb-2"></div>
                <p class="text-xs text-teal-400 animate-pulse">Sedang Memproses Gambar...</p>
            </div>
        </div>

        <div id="resultBox" class="mt-6 p-5 azana-card rounded-2xl hidden">
            <div class="flex justify-between items-center mb-3">
                <span class="text-teal-400 text-xs font-bold uppercase tracking-wider">Hasil AI :</span>
                <button onclick="location.reload()" class="text-gray-500 text-xs hover:text-white">Reset</button>
            </div>
            <div id="outputText" class="text-sm text-gray-300 leading-relaxed overflow-x-auto"></div>
        </div>
    </div>

    <script>
        // API CONFIG
        const API_KEY = "AIzaSyAHqzT20UpRRXY6gnCXASVAwG9R1ZHVUyw";
        const MODEL = "gemini-1.5-flash"; // Flash lebih cepat untuk web perantara
        
        // TEMPEL PROMPT SAKTI KAMU DI SINI
        const PROMPT_SAKTI = "Ultra-high-resolution 4K enhancement based strictly on the provided reference image. Absolute fidelity to original facial anatomy, proportions, and identity. Preserve expression, gaze, pose, camera angle, framing, and perspective with zero deviation. Clothing, hair, skin, and background elements must remain unchanged in structure, placement, and design.
Recover fine-grain detail with natural realism. Enhance pores, fine lines, hair strands, eyelashes, fabric weave, seams, and material edges without introducing stylization. Maintain original color science, white balance, and tonal relationships exactly as captured. Lighting direction, intensity, contrast, and shadow behavior must match the source image precisely, with only improved clarity and expanded dynamic range. No relighting, no reshaping. Remove any grain.
Apply controlled sharpening and high-frequency detail reconstruction. Remove compression artifacts and noise while retaining authentic texture. No smoothing, no plastic skin, no artificial gloss. Facial features must remain consistent across the entire image with coherent anatomy and clean, stable edges.
Negative constraints: no warping, no facial drift, no added or missing anatomy, no altered hands, no distortions, no perspective shift, no text or graphics, no hallucinated detail, no stylized rendering. Output must read as a true-to-life, photorealistic upscale that matches the reference exactly, only clearer, sharper, and higher resolution.";

        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const imgPreview = document.getElementById('imgPreview');
        const previewWrap = document.getElementById('previewWrap');
        const initialUI = document.getElementById('initialUI');
        const btnAction = document.getElementById('btnAction');
        const loadingUI = document.getElementById('loadingUI');
        const resultBox = document.getElementById('resultBox');
        const outputText = document.getElementById('outputText');

        let base64Data = "";

        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (readerEvent) => {
                    base64Data = readerEvent.target.result.split(',')[1];
                    imgPreview.src = readerEvent.target.result;
                    
                    // Switch UI
                    previewWrap.classList.remove('hidden');
                    initialUI.classList.add('hidden');
                    btnAction.classList.remove('hidden');
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        btnAction.onclick = async () => {
            btnAction.classList.add('hidden');
            loadingUI.classList.remove('hidden');

            const payload = {
                contents: [{
                    parts: [
                        { text: Ultra-high-resolution 4K enhancement based strictly on the provided reference image. Absolute fidelity to original facial anatomy, proportions, and identity. Preserve expression, gaze, pose, camera angle, framing, and perspective with zero deviation. Clothing, hair, skin, and background elements must remain unchanged in structure, placement, and design.
Recover fine-grain detail with natural realism. Enhance pores, fine lines, hair strands, eyelashes, fabric weave, seams, and material edges without introducing stylization. Maintain original color science, white balance, and tonal relationships exactly as captured. Lighting direction, intensity, contrast, and shadow behavior must match the source image precisely, with only improved clarity and expanded dynamic range. No relighting, no reshaping. Remove any grain.
Apply controlled sharpening and high-frequency detail reconstruction. Remove compression artifacts and noise while retaining authentic texture. No smoothing, no plastic skin, no artificial gloss. Facial features must remain consistent across the entire image with coherent anatomy and clean, stable edges.
Negative constraints: no warping, no facial drift, no added or missing anatomy, no altered hands, no distortions, no perspective shift, no text or graphics, no hallucinated detail, no stylized rendering. Output must read as a true-to-life, photorealistic upscale that matches the reference exactly, only clearer, sharper, and higher resolution. },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const textResult = data.candidates[0].content.parts[0].text;

                // Tampilkan Hasil
                resultBox.classList.remove('hidden');
                outputText.innerText = textResult;
                
            } catch (err) {
                alert("Gagal memproses. Pastikan API Key aktif.");
                btnAction.classList.remove('hidden');
            } finally {
                loadingUI.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
