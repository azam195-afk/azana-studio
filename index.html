<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZANA SMART ENHANCER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0b10; color: white; font-family: sans-serif; }
        .azana-card { background-color: #14151a; border: 1px solid #222; }
        .dashed-border { border: 2px dashed #444; border-radius: 24px; transition: 0.3s; }
        .dashed-border.drag-over { border-color: #2dd4bf; background: #1a1b23; }
        .loader { border-top-color: #2dd4bf; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="flex items-center justify-center gap-3 mb-6">
            <div class="w-10 h-10 bg-teal-500 rounded-xl flex items-center justify-center shadow-lg">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-widest uppercase">Azana Smart</h1>
        </div>

        <div class="azana-card p-5 rounded-[2rem]">
            <div id="dropArea" class="dashed-border p-8 flex flex-col items-center text-center cursor-pointer">
                
                <input type="file" id="fileInput" class="hidden" accept="image/*">

                <div id="previewWrap" class="hidden w-full mb-4">
                    <img id="imgPreview" class="w-full rounded-xl border border-teal-500/30">
                </div>

                <div id="initialUI">
                    <div class="w-16 h-16 bg-purple-900/20 rounded-full flex items-center justify-center mb-4 mx-auto text-purple-400">
                        <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    </div>
                    <p class="text-lg font-bold">Klik atau Drop Foto</p>
                    <p class="text-xs text-gray-500 mt-1">Upload foto yang mau dijernihkan</p>
                </div>
            </div>

            <button id="btnAction" class="w-full mt-5 py-4 bg-purple-600 hover:bg-purple-500 rounded-2xl font-bold hidden uppercase tracking-widest">
                Jernihkan Sekarang
            </button>
            
            <div id="loadingUI" class="hidden flex-col items-center mt-5 text-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-800 h-10 w-10 mb-2 mx-auto"></div>
                <p class="text-xs text-teal-400 animate-pulse">Gemini sedang bekerja...</p>
            </div>
        </div>

        <div id="resultBox" class="mt-6 p-5 azana-card rounded-2xl hidden">
            <div class="flex justify-between items-center mb-3">
                <span class="text-teal-400 text-xs font-bold uppercase">Hasil :</span>
                <button onclick="location.reload()" class="text-gray-500 text-xs">Reset</button>
            </div>
            <div id="outputText" class="text-sm text-gray-300 whitespace-pre-wrap"></div>
        </div>
    </div>

        const btnAction = document.getElementById('btnAction');
        const loadingUI = document.getElementById('loadingUI');
        const resultBox = document.getElementById('resultBox');
        const outputText = document.getElementById('outputText');

        let base64Data = "";

        // Fungsi supaya klik area drop = buka file manager
        dropArea.addEventListener('click', () => fileInput.click());

        // Fungsi Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        dropArea.addEventListener('dragover', () => dropArea.classList.add('drag-over'));
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
        dropArea.addEventListener('drop', (e) => {
            dropArea.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            const file = files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Data = e.target.result.split(',')[1];
                    imgPreview.src = e.target.result;
                    previewWrap.classList.remove('hidden');
                    initialUI.classList.add('hidden');
                    btnAction.classList.remove('hidden');
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        btnAction.addEventListener('click', async (e) => {
            e.stopPropagation(); // Biar gak trigger klik dropArea
            btnAction.classList.add('hidden');
            loadingUI.classList.remove('hidden');

            const payload = {
                contents: [{
                    parts: [
                        { text: PROMPT_SAKTI },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]
                }]
            };

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resData = await resp.json();
                const hasil = resData.candidates[0].content.parts[0].text;

                outputText.innerText = hasil;
