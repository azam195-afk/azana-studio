<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZANA Smart Enhancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi Tailwind untuk warna kustom sesuai gambar
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'azana-bg': '#0a0b10', // Hitam background sangat gelap
                        'azana-card': '#14151a', // Hitam kartu sedikit lebih terang
                        'azana-teal': '#2dd4bf', // Hijau toska ikon/border
                        'azana-purple': '#a855f7', // Ungu tombol
                    }
                }
            }
        }
    </script>
    <style>
        /* Gaya kustom tambahan */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0b10;
            color: white;
        }
        
        /* Efek glow (bersinar) halus di sekitar logo */
        .glow-teal {
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.3);
        }

        /* Border putus-putus kustom untuk area drop */
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%23333' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 16px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md flex flex-col items-center">
        
        <div class="flex items-center justify-center gap-4 mb-3 w-full">
            <div class="w-12 h-12 bg-azana-card rounded-2xl flex items-center justify-center border border-gray-800 glow-teal">
                <svg class="w-7 h-7 text-azana-teal" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <h1 class="text-2xl font-bold tracking-tight text-white">AZANA</h1>
                <h2 class="text-lg font-semibold text-azana-teal leading-tight">SMART ENHANCER</h2>
            </div>
        </div>

        <p class="text-sm text-center text-gray-400 mb-8 px-4 leading-relaxed">
            Meningkatkan kualitas foto secara instan. Powered by AI Image Generation (Optimized Mode).
        </p>

        <div class="w-full bg-azana-card rounded-3xl p-6 border border-gray-800 relative shadow-2xl">
            
            <div class="dashed-border w-full aspect-square flex flex-col items-center justify-center p-8 text-center cursor-pointer hover:bg-gray-900/50 transition-colors" id="dropArea">
                
                <div class="w-20 h-20 rounded-full bg-[#2a1a3a] flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-azana-purple" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M5.5 13a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.977A4.5 4.5 0 1113.5 13H11V9.413l1.293 1.293a1 1 0 001.414-1.414l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13H5.5z"></path>
                        <path d="M9 13h2v5a1 1 0 11-2 0v-5z"></path>
                    </svg>
                </div>

                <h3 class="text-xl font-bold text-white mb-2">Drag & Drop Foto di sini</h3>
                <p class="text-xs text-gray-500 mb-8 leading-relaxed">
                    File JPG/PNG akan dioptimasi otomatis agar proses lebih cepat.
                </p>

                <button class="px-6 py-2.5 bg-transparent border border-gray-600 rounded-full text-sm font-medium text-white hover:border-gray-400 hover:bg-gray-800 transition-all">
                    Browse File
                </button>
                
                <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png">
            </div>
        </div>
        
        <div class="w-full mt-10 p-4 bg-azana-card rounded-full border border-gray-800 text-sm text-gray-600">
            Yuk, tulis atau buat sesuatu bersama...
        </div>

    </div>

    <script>
        // Logika sederhana untuk interaksi tombol browse
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const browseBtn = dropArea.querySelector('button');

        // Saat area drop atau tombol browse diklik, pemicu input file
        dropArea.addEventListener('click', () => fileInput.click());

        // Logika dasar saat file dipilih (nanti disambung ke backend)
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                alert(`File "${file.name}" terpilih! Langkah selanjutnya adalah membuat fungsi upload ke AI.`);
                // Di sini nanti proses upload dan penjernihan dimulai
            }
        });
    </script>
</body>
</html>
